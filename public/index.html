    <!-- Skeleton shown until the app mounts -->
    <style>
      #app-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #ffffff;
        overflow: hidden;
        transition: opacity 0.45s ease;
        font-family: 'Space Grotesk', system-ui, sans-serif;
      }
      #app-skeleton.sk-hide { opacity: 0; pointer-events: none; }
      #app-skeleton.sk-dark { background: #080808; }
      .sk-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 28px 40px;
      }
      .sk-main {
        max-width: 1080px;
        margin: 56px auto 0;
        padding: 0 48px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .sk-box {
        display: block;
        border-radius: 8px;
        background: #ececec;
        background-image: linear-gradient(90deg, rgba(0,0,0,0) 0, rgba(255,255,255,0.6) 50%, rgba(0,0,0,0) 100%);
        background-size: 220px 100%;
        background-repeat: no-repeat;
        animation: sk-shimmer 1.3s ease-in-out infinite;
      }
      .sk-dark .sk-box {
        background: #191919;
        background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0) 100%);
        background-size: 220px 100%;
        background-repeat: no-repeat;
      }
      .sk-logo { width: 44px; height: 44px; border-radius: 50%; }
      .sk-nav { width: 190px; height: 42px; border-radius: 100px; }
      .sk-eyebrow { width: 34%; height: 16px; }
      .sk-title { width: 68%; height: 54px; border-radius: 12px; margin-top: 6px; }
      .sk-line { width: 52%; height: 18px; }
      .sk-line.short { width: 42%; }
      .sk-cover { width: 100%; height: 340px; border-radius: 18px; margin-top: 26px; }
      @keyframes sk-shimmer {
        0% { background-position: -220px 0; }
        100% { background-position: calc(100% + 220px) 0; }
      }
      @media (max-width: 700px) {
        .sk-header { padding: 22px 20px; }
        .sk-main { padding: 0 24px; margin-top: 40px; }
        .sk-nav { width: 44px; }
        .sk-cover { height: 220px; }
      }
      @media (prefers-reduced-motion: reduce) { .sk-box { animation: none; } }
    </style>
